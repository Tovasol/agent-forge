<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0e0c" />

    <title>PipelineForge — A managed team for your data pipelines, not just a tool</title>
    <meta
      name="description"
      content="Done-for-you data reliability for Series A–C B2B SaaS teams running 10+ sources into Snowflake or BigQuery. We own the on-call, the fixes, and the schema breakages — so your engineers never get paged. Book a 20-min discovery call."
    />
    <link rel="canonical" href="https://pipelineforge.io/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PipelineForge" />
    <meta property="og:title" content="A managed team for your data pipelines, not just a tool" />
    <meta
      property="og:description"
      content="We own the on-call, the fixes, and the schema breakages so your engineers never get paged. Done-for-you pipeline reliability for Series A–C B2B SaaS."
    />
    <meta property="og:url" content="https://pipelineforge.io/" />
    <meta property="og:image" content="https://pipelineforge.io/og.png" />
    <meta property="og:image:alt" content="PipelineForge — managed data pipeline reliability" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="A managed team for your data pipelines, not just a tool" />
    <meta
      name="twitter:description"
      content="We own the on-call, the fixes, and the schema breakages so your engineers never get paged. Done-for-you pipeline reliability for Series A–C B2B SaaS."
    />
    <meta name="twitter:image" content="https://pipelineforge.io/og.png" />

    <!-- Org structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "PipelineForge",
        "description": "Done-for-you data pipeline reliability — a managed team that owns the on-call, fixes, and schema breakages for B2B SaaS data teams.",
        "areaServed": "Global",
        "url": "https://pipelineforge.io/"
      }
    </script>

    <!-- Cloudflare Web Analytics (cookieless). Set the real token in the Pages
         dashboard env (VITE replaces it at build); leaving the placeholder is a
         no-op locally. Replace CF_BEACON_TOKEN before launch. -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "CF_BEACON_TOKEN"}'
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
