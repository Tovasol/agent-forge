#:schema node_modules/wrangler/config-schema.json
name = "pipelineforge-site"
pages_build_output_dir = "dist"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# ── Non-secret environment variables ──────────────────────────────────────────
# Uncomment and fill in after creating the Google Sheet / Resend sender:
[vars]
# CRM_SHEET_ID = "your-google-sheet-id"
# RESEND_FROM  = "PipelineForge <hello@pipelineforge.dev>"

# ── Secrets (set via dashboard or CLI) ────────────────────────────────────────
# wrangler pages secret put GOOGLE_SA_EMAIL  --project-name pipelineforge-site
# wrangler pages secret put GOOGLE_SA_KEY    --project-name pipelineforge-site
# wrangler pages secret put RESEND_API_KEY   --project-name pipelineforge-site
