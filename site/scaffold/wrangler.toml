#:schema node_modules/wrangler/config-schema.json
# Cloudflare Pages project (hosting decision: Cloudflare Pages + Functions).
# The lead-capture API lives in functions/api/lead.ts as a Pages Function —
# there is no standalone Worker entrypoint. Run locally with:
#   npm run build && npx wrangler pages dev dist
name = "pipelineforge-site"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# ── Non-secret vars (set in the Pages dashboard for production) ──
[vars]
# CRM_SHEET_ID  = "your-google-sheet-id"
# RESEND_FROM   = "PipelineForge <hello@pipelineforge.io>"

# ── Secrets (DO NOT put values here) ──
#   wrangler pages secret put GOOGLE_SA_EMAIL
#   wrangler pages secret put GOOGLE_SA_KEY
#   wrangler pages secret put RESEND_API_KEY

# ── Optional D1 (only when server-side querying is needed; Sheets is the
#    launch CRM). Uncomment + bind in the Pages dashboard to enable.
# [[d1_databases]]
# binding = "LEADS"
# database_name = "leads"
# database_id = "xxxxxxxx"
